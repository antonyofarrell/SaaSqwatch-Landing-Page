<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="card">
  <div class="eyebrow">Iconography · Lucide 1.75px stroke</div>
  <div style="display:flex;gap:22px;align-items:center;color:var(--fg-1);margin-bottom:14px" id="icons">
    <i data-lucide="eye" style="width:28px;height:28px;stroke-width:1.75"></i>
    <i data-lucide="play-circle" style="width:28px;height:28px;stroke-width:1.75"></i>
    <i data-lucide="search" style="width:28px;height:28px;stroke-width:1.75"></i>
    <i data-lucide="thumbs-up" style="width:28px;height:28px;stroke-width:1.75;color:#5dcaa5"></i>
    <i data-lucide="thumbs-down" style="width:28px;height:28px;stroke-width:1.75;color:#f0997b"></i>
    <i data-lucide="bookmark" style="width:28px;height:28px;stroke-width:1.75"></i>
    <i data-lucide="layers" style="width:28px;height:28px;stroke-width:1.75"></i>
    <i data-lucide="zap" style="width:28px;height:28px;stroke-width:1.75;color:#3ce5e5"></i>
    <i data-lucide="trophy" style="width:28px;height:28px;stroke-width:1.75"></i>
    <i data-lucide="settings-2" style="width:28px;height:28px;stroke-width:1.75"></i>
  </div>
  <div style="display:flex;gap:22px;align-items:center;color:var(--fg-2)">
    <i data-lucide="rss" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="youtube" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="message-square" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="share-2" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="chevron-right" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="filter" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="clock" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="tag" style="width:20px;height:20px;stroke-width:1.75"></i>
    <i data-lucide="arrow-up-right" style="width:20px;height:20px;stroke-width:1.75"></i>
    <span style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-left:auto">Lucide · 1.75 stroke · rounded joins</span>
  </div>
  <script>lucide.createIcons();</script>
</div>
</body>
</html>
