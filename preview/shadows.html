<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Shadows & elevation</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding:36px 32px">
  <div class="eyebrow">Elevation · Shadow system</div>
  <div style="display:flex;gap:18px">
    <div style="flex:1;text-align:center">
      <div style="height:90px;border-radius:14px;background:var(--bg-elevated);box-shadow:0 1px 2px rgba(0,0,0,0.25)"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:10px">sm · resting</div>
    </div>
    <div style="flex:1;text-align:center">
      <div style="height:90px;border-radius:14px;background:var(--bg-elevated);box-shadow:0 6px 18px rgba(0,0,0,0.35)"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:10px">md · hover</div>
    </div>
    <div style="flex:1;text-align:center">
      <div style="height:90px;border-radius:14px;background:var(--bg-elevated);box-shadow:0 18px 48px rgba(0,0,0,0.45)"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:10px">lg · modal</div>
    </div>
    <div style="flex:1;text-align:center">
      <div style="height:90px;border-radius:14px;background:var(--bg-elevated);box-shadow:0 0 0 1px rgba(60,229,229,0.35), 0 8px 32px rgba(60,229,229,0.18)"></div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:10px">glow · watching</div>
    </div>
  </div>
</div>
</body>
</html>
