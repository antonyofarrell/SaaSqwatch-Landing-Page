<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Spacing · 4px base grid</div>
  <div style="display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;align-items:center;gap:14px"><div style="width:4px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-1</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">4px · inline gaps</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:8px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-2</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">8px · chip padding</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:12px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-3</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">12px · tight rhythm</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:16px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-4</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">16px · card inner</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:24px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-5</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">24px · card gutter</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:32px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-6</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">32px · card padding</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:48px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-7</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">48px · section</span></div>
    <div style="display:flex;align-items:center;gap:14px"><div style="width:64px;height:20px;background:var(--accent)"></div><span style="font-family:var(--font-mono);font-size:12px;color:var(--fg-2);width:60px">sp-8</span><span style="font-family:var(--font-mono);font-size:11px;color:var(--fg-3)">64px · hero</span></div>
  </div>
</div>
</body>
</html>
