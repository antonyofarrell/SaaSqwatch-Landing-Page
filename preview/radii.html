<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Corner radii</div>
  <div style="display:flex;gap:14px;align-items:flex-end">
    <div style="text-align:center"><div style="width:72px;height:72px;background:var(--bg-elevated);border:1px solid var(--border-2);border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px">xs · 4</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">inline code</div></div>
    <div style="text-align:center"><div style="width:72px;height:72px;background:var(--bg-elevated);border:1px solid var(--border-2);border-radius:8px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px">sm · 8</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">chips / tags</div></div>
    <div style="text-align:center"><div style="width:72px;height:72px;background:var(--bg-elevated);border:1px solid var(--border-2);border-radius:12px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px">md · 12</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">cards</div></div>
    <div style="text-align:center"><div style="width:72px;height:72px;background:var(--bg-elevated);border:1px solid var(--border-2);border-radius:20px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px">lg · 20</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">hero cards</div></div>
    <div style="text-align:center"><div style="width:72px;height:72px;background:var(--bg-elevated);border:1px solid var(--border-2);border-radius:28px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px">xl · 28</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">modals</div></div>
    <div style="text-align:center"><div style="width:120px;height:72px;background:var(--bg-elevated);border:1px solid var(--border-2);border-radius:999px"></div><div style="font-family:var(--font-mono);font-size:11px;color:var(--fg-2);margin-top:8px">pill · 999</div><div style="font-family:var(--font-mono);font-size:10px;color:var(--fg-3)">CTA buttons</div></div>
  </div>
</div>
</body>
</html>
