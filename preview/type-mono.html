<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Mono & eyebrow</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Mono &amp; eyebrows · JetBrains Mono + Space Grotesk</div>
  <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px">
    <span style="font-family:var(--font-display);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--accent)">Episode 042 · S-Tier</span>
    <span style="font-family:var(--font-display);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.14em;color:var(--fg-3)">· Comparisons</span>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap">
    <span style="font-family:var(--font-mono);font-size:12px;background:var(--bg-inset);padding:4px 10px;border-radius:6px;color:var(--accent);border:1px solid var(--border-1)">v3.11.2</span>
    <span style="font-family:var(--font-mono);font-size:12px;background:var(--bg-inset);padding:4px 10px;border-radius:6px;color:var(--mint-500);border:1px solid var(--border-1)">$0–29/mo</span>
    <span style="font-family:var(--font-mono);font-size:12px;background:var(--bg-inset);padding:4px 10px;border-radius:6px;color:var(--caution-500);border:1px solid var(--border-1)">~4.2s cold start</span>
    <span style="font-family:var(--font-mono);font-size:12px;background:var(--bg-inset);padding:4px 10px;border-radius:6px;color:var(--fg-2);border:1px solid var(--border-1)">12/10/2026</span>
  </div>
  <div style="margin-top:14px;font-family:var(--font-mono);font-size:10px;color:var(--fg-3);text-transform:uppercase;letter-spacing:0.08em">Eyebrow 11/14 · 600 · 0.14em · teal — Mono 12/16 · 400 · used for specs, versions, prices, timestamps</div>
</div>
</body>
</html>
