<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Accent scales</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Accents · Teal / Mint / Caution scales</div>
  <div class="col" style="gap:14px">
    <div class="row" style="gap:10px">
      <div class="swatch"><div class="chip" style="background:#20b8b8"></div><div class="name">Teal 600</div><div class="hex">press</div></div>
      <div class="swatch"><div class="chip" style="background:#3ce5e5"></div><div class="name">Teal 500</div><div class="hex">brand</div></div>
      <div class="swatch"><div class="chip" style="background:#6eeded"></div><div class="name">Teal 400</div><div class="hex">hover</div></div>
      <div class="swatch"><div class="chip" style="background:#b5f5f5"></div><div class="name">Teal 200</div><div class="hex">tint</div></div>
      <div class="swatch"><div class="chip" style="background:#e8fafa"></div><div class="name">Teal 50</div><div class="hex">bg</div></div>
    </div>
    <div class="row" style="gap:10px">
      <div class="swatch"><div class="chip" style="background:#3ea985"></div><div class="name">Mint 600</div><div class="hex">#3ea985</div></div>
      <div class="swatch"><div class="chip" style="background:#5dcaa5"></div><div class="name">Mint 500</div><div class="hex">pro</div></div>
      <div class="swatch"><div class="chip" style="background:#bfe8d8"></div><div class="name">Mint 200</div><div class="hex">#bfe8d8</div></div>
      <div class="swatch"><div class="chip" style="background:#d77553"></div><div class="name">Caution 600</div><div class="hex">#d77553</div></div>
      <div class="swatch"><div class="chip" style="background:#f0997b"></div><div class="name">Caution 500</div><div class="hex">con</div></div>
    </div>
  </div>
</div>
</body>
</html>
