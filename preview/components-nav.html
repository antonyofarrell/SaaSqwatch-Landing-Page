<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Nav & search</title>
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div class="card" style="padding:22px 24px">
  <div class="eyebrow">Component · Top navigation</div>
  <div style="display:flex;align-items:center;gap:16px;background:var(--navy-700);border:1px solid var(--border-1);border-radius:14px;padding:12px 16px">
    <img src="../assets/icon.png" style="width:32px;height:32px">
    <div style="display:flex;gap:16px;font-family:var(--font-display);font-weight:600;font-size:14px;white-space:nowrap">
      <span style="color:var(--fg-1)">Reviews</span>
      <span style="color:var(--fg-2)">Comparisons</span>
      <span style="color:var(--fg-2)">Tier&nbsp;lists</span>
      <span style="color:var(--fg-2)">Tools</span>
    </div>
    <div style="margin-left:auto;display:flex;gap:10px;align-items:center">
      <div style="display:flex;align-items:center;gap:8px;background:var(--bg-inset);border:1px solid var(--border-2);border-radius:999px;padding:6px 14px;font-size:12px;color:var(--fg-3);width:170px"><i data-lucide="search" style="width:14px;height:14px"></i>Search tools…</div>
      <button style="background:var(--accent);color:#0f1524;border:0;border-radius:999px;padding:8px 14px;font-family:var(--font-display);font-weight:600;font-size:13px">Subscribe</button>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</div>
</body>
</html>
