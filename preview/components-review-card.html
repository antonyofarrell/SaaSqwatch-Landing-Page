<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Review card</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding:24px">
  <div class="eyebrow">Component · Review card</div>
  <div style="background:var(--navy-700);border:1px solid var(--border-1);border-radius:16px;overflow:hidden;box-shadow:0 6px 18px rgba(0,0,0,0.35)">
    <div style="height:140px;background:linear-gradient(135deg,#2b375a,#1a2235);position:relative;display:flex;align-items:flex-end;padding:14px">
      <div style="position:absolute;inset:0;background:radial-gradient(circle at 30% 40%, rgba(60,229,229,0.18), transparent 55%)"></div>
      <span style="position:absolute;top:12px;right:12px;background:var(--accent);color:#0f1524;font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:5px 10px;border-radius:999px">S-tier</span>
      <span style="position:absolute;top:12px;left:12px;font-family:var(--font-mono);font-size:11px;color:#f5f7fb;background:rgba(15,21,36,0.7);padding:4px 8px;border-radius:6px">12:48</span>
      <div style="position:relative;width:44px;height:44px;border-radius:999px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:#0f1524">▶</div>
    </div>
    <div style="padding:16px 18px 18px">
      <div style="font-family:var(--font-display);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent);margin-bottom:8px">Ep. 042 · Comparisons</div>
      <div style="font-family:var(--font-display);font-weight:700;font-size:20px;line-height:1.2;letter-spacing:-0.01em;color:var(--fg-1)">The 12 best Notion alternatives, tested on real projects</div>
      <div style="display:flex;gap:12px;margin-top:12px;font-family:var(--font-body);font-size:12px;color:var(--fg-3)">
        <span>Avery Kell</span><span>· 40,281 views</span><span>· 3 days ago</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
