<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navy scale</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card">
  <div class="eyebrow">Neutrals · Navy scale</div>
  <div class="row" style="gap:10px">
    <div class="swatch"><div class="chip" style="background:#0f1524"></div><div class="name">Navy 900</div><div class="hex">#0f1524</div></div>
    <div class="swatch"><div class="chip" style="background:#1a2235"></div><div class="name">Navy 800</div><div class="hex">#1a2235</div></div>
    <div class="swatch"><div class="chip" style="background:#222c44"></div><div class="name">Navy 700</div><div class="hex">#222c44</div></div>
    <div class="swatch"><div class="chip" style="background:#2b375a"></div><div class="name">Navy 600</div><div class="hex">#2b375a</div></div>
    <div class="swatch"><div class="chip" style="background:#3a4872"></div><div class="name">Navy 500</div><div class="hex">#3a4872</div></div>
    <div class="swatch"><div class="chip" style="background:#5a6791"></div><div class="name">Navy 400</div><div class="hex">#5a6791</div></div>
    <div class="swatch"><div class="chip" style="background:#8791b4"></div><div class="name">Navy 300</div><div class="hex">#8791b4</div></div>
  </div>
  <div style="margin-top:14px;font-family:var(--font-body);font-size:12px;color:var(--fg-3);line-height:1.5">Step up lightness to differentiate surfaces; reserve borders for hairlines.</div>
</div>
</body>
</html>
