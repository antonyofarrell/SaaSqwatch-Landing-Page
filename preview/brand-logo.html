<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Logo lockups</title>
<link rel="stylesheet" href="_card.css">
</head>
<body>
<div class="card" style="padding:0;background:transparent;border:0">
  <div style="display:flex;gap:0">
    <div style="flex:1;background:#1a2235;padding:28px;display:flex;align-items:center;justify-content:center;min-height:150px;border-radius:14px 0 0 14px">
      <img src="../assets/logo-teal.png" style="max-width:84%;height:auto">
    </div>
    <div style="flex:0.45;background:var(--paper-500);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border-radius:0 14px 14px 0">
      <img src="../assets/icon.png" style="width:88px;height:88px">
      <div style="font-family:var(--font-display);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal-600)">Mark · 88px</div>
    </div>
  </div>
</div>
</body>
</html>
